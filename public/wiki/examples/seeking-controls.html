<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Seeking &amp; Navigation — NoMercy Video Player</title>
	<style>
		*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
		body { background: #18181b; color: #e4e4e7; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
		header { padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #27272a; }
		header a { color: #a78bfa; text-decoration: none; font-size: 0.875rem; }
		header a:hover { text-decoration: underline; }
		header h1 { font-size: 1.25rem; font-weight: 600; flex: 1; }
		main { max-width: 960px; margin: 0 auto; padding: 24px; }
		main > p { color: #a1a1aa; margin-bottom: 16px; line-height: 1.5; }
		#player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
		.controls { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
		.controls button {
			background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46;
			border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.875rem;
		}
		.controls button:hover { background: #3f3f46; }
		.controls button.active { background: #7c3aed; border-color: #7c3aed; }
		h2 { font-size: 1rem; font-weight: 600; margin-top: 24px; margin-bottom: 8px; }
		pre#log {
			background: #27272a; padding: 16px; border-radius: 8px;
			max-height: 200px; overflow-y: auto; font-size: 13px; margin-top: 8px;
			font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
			line-height: 1.4; white-space: pre-wrap;
		}
		#position {
			background: #27272a; border: 1px solid #3f3f46; border-radius: 6px;
			padding: 12px 16px; margin-top: 16px; font-size: 0.9rem;
			font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
		}
		#position strong { color: #a78bfa; }
	</style>
</head>
<body>
	<header>
		<a href="/wiki/examples/">← All Examples</a>
		<h1>Seeking &amp; Navigation</h1>
		<a href="https://github.com/NoMercy-Entertainment/NoMercyVideoPlayer/wiki/API-Reference-Methods" target="_blank" rel="noopener">Wiki ↗</a>
	</header>

	<main>
		<p>
			Demonstrates seeking to absolute positions, percentage-based positions,
			and relative seeking (forward/rewind). Watch the position display update in real time.
		</p>

		<div id="player"></div>

		<div class="controls">
			<button onclick="player.play()">Play</button>
			<button onclick="player.pause()">Pause</button>
		</div>

		<div id="position">Position: <strong>0:00 / 14:48 (0%)</strong></div>

		<h2>Seek to Time</h2>
		<div class="controls">
			<button onclick="player.seek(0)">Seek to 0s</button>
			<button onclick="player.seek(30)">Seek to 30s</button>
			<button onclick="player.seek(60)">Seek to 60s</button>
			<button onclick="player.seek(120)">Seek to 120s</button>
		</div>

		<h2>Seek to Percentage</h2>
		<div class="controls">
			<button onclick="player.seek(player.duration() * 0.25)">Seek to 25%</button>
			<button onclick="player.seek(player.duration() * 0.50)">Seek to 50%</button>
			<button onclick="player.seek(player.duration() * 0.75)">Seek to 75%</button>
		</div>

		<h2>Relative Seeking</h2>
		<div class="controls">
			<button onclick="player.forward(10)">Forward 10s</button>
			<button onclick="player.rewind(10)">Rewind 10s</button>
			<button onclick="player.seek(0)">Restart</button>
		</div>

		<h2>Event Log</h2>
		<pre id="log"></pre>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/@nomercy-entertainment/nomercy-video-player@1.0.0-beta.12/dist/nomercy-video-player.iife.js"></script>
	<script>
		var logEl = document.getElementById('log');
		function log(msg) {
			logEl.textContent += msg + '\n';
			logEl.scrollTop = logEl.scrollHeight;
		}

		var positionEl = document.getElementById('position');

		// Initialize the player
		var player = nmplayer('player').setup({
			playlist: [{
				id: 'sintel',
				title: 'Sintel',
				description: 'A girl searches for her lost dragon in a fantasy world.',
				image: 'https://image.tmdb.org/t/p/w780/q2bVM5z90tCGbmXYtq2J38T5hSX.jpg',
				file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films/Sintel.(2010)/Sintel.(2010).NoMercy.m3u8',
				duration: '14:48',
			}],
		});

		player.on('ready', function () {
			log('[ready] Player is ready');
		});

		// Update position display on time events
		player.on('time', function (data) {
			positionEl.innerHTML = 'Position: <strong>' +
				data.currentTimeHuman + ' / ' + data.durationHuman +
				' (' + Math.round(data.percentage) + '%)</strong>';
		});

		// seek and seeked events emit no data payload
		player.on('seek', function () {
			log('[seek] Seeking...');
		});

		player.on('seeked', function () {
			log('[seeked] Seek complete');
		});

		player.on('forward', function () {
			log('[forward] Forwarding');
		});

		player.on('rewind', function () {
			log('[rewind] Rewinding');
		});
	</script>
</body>
</html>
