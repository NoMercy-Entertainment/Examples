<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Quick Start — NoMercy Video Player</title>
	<link rel="stylesheet" href="shared.css" />
</head>
<body>
	<header>
		<a href="/wiki/examples/">← Examples</a>
		<h1>Quick Start</h1>
	</header>

	<main>
		<p>The absolute minimum setup. One container, one video, a few event listeners.</p>

		<div id="player"></div>

		<div class="row">
			<button type="button" onclick="player.play()">Play</button>
			<button type="button" onclick="player.pause()">Pause</button>
		</div>

		<h2>Events</h2>
		<pre id="log"></pre>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/@nomercy-entertainment/nomercy-video-player@1.0.0-beta.19/dist/nomercy-video-player.iife.js"></script>
	<script src="shared.js"></script>
	<script>
		var { log } = createLogger();

		var config = {
			basePath: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films/Sintel.(2010)',
			playlist: [{
				id: 'sintel',
				title: 'Sintel',
				description: 'A girl searches for her lost dragon in a fantasy world.',
				image: 'https://image.tmdb.org/t/p/w780/q2bVM5z90tCGbmXYtq2J38T5hSX.jpg',
				file: '/Sintel.(2010).NoMercy.m3u8',
				duration: '14:48',
			}],
		};

		var player = nmplayer('player').setup(config);

		player.on('ready', function () { log('[ready] Player is ready'); });
		player.on('play', function () { log('[play] Playing'); });
		player.on('pause', function () { log('[pause] Paused'); });
		player.on('complete', function () { log('[complete] Finished'); });
		player.on('time', function (d) {
			if (Math.floor(d.currentTime) % 10 === 0 && d.currentTime > 0)
				log('[time] ' + d.currentTimeHuman + ' / ' + d.durationHuman);
		});
	</script>
</body>
</html>
