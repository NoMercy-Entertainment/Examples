<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ASS Subtitles (OctopusPlugin) — NoMercy Video Player</title>
	<style>
		*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
		body { background: #18181b; color: #e4e4e7; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
		header { padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #27272a; }
		header a { color: #a78bfa; text-decoration: none; font-size: 0.875rem; }
		header a:hover { text-decoration: underline; }
		header h1 { font-size: 1.25rem; font-weight: 600; flex: 1; }
		main { max-width: 960px; margin: 0 auto; padding: 24px; }
		main > p { color: #a1a1aa; margin-bottom: 16px; line-height: 1.5; }
		#player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
		.controls { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
		.controls button {
			background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46;
			border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.875rem;
		}
		.controls button:hover { background: #3f3f46; }
		.controls button.active { background: #7c3aed; border-color: #7c3aed; }
		h2 { font-size: 1rem; font-weight: 600; margin-top: 24px; margin-bottom: 8px; }
		pre#log {
			background: #27272a; padding: 16px; border-radius: 8px;
			max-height: 200px; overflow-y: auto; font-size: 13px; margin-top: 8px;
			font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
			line-height: 1.4; white-space: pre-wrap;
		}
	</style>
</head>
<body>
	<header>
		<a href="/wiki/examples/">← All Examples</a>
		<h1>ASS Subtitles (OctopusPlugin)</h1>
		<a href="https://github.com/NoMercy-Entertainment/NoMercyVideoPlayer/wiki/Quick-Start-Guide" target="_blank" rel="noopener">Wiki ↗</a>
	</header>

	<main>
		<p>
			Demonstrates styled ASS/SSA subtitles rendered via libass WebAssembly.
			The font file is loaded from a <code>fonts.json</code> track.
			The OctopusPlugin is included in the IIFE bundle and registered at runtime.
		</p>

		<div id="player"></div>

		<div class="controls">
			<button onclick="player.togglePlayback()">Play / Pause</button>
			<button id="sub-toggle" onclick="toggleSub()">Enable Subtitles</button>
		</div>

		<h2>Subtitle Status</h2>
		<p id="sub-status" style="color:#a1a1aa; margin-bottom:8px;">Subtitles: off</p>

		<h2>Event Log</h2>
		<pre id="log"></pre>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/@nomercy-entertainment/nomercy-video-player@1.0.0-beta.13/dist/nomercy-video-player.iife.js"></script>
	<script>
		// Get the OctopusPlugin from the IIFE bundle
		var OctopusPlugin = nmplayer.OctopusPlugin;

		var player = nmplayer('player').setup({
			playlist: [{
				id: 'rail-wars',
				title: 'Rail Wars!',
				description: 'Rail Wars! — Episode preview with styled ASS subtitles and custom fonts.',
				image: 'https://image.tmdb.org/t/p/original/vH8NqN2LMcmtBv037iHGwcPOgCZ.jpg',
				file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/refs/heads/master/Anime/Anime/Rail.Wars!.(2014)/Rail.Wars!.S00E00/Rail.Wars!.(2014).S00E00.NoMercy.m3u8',
				duration: '2:00',
				tracks: [
					{
						id: 'ass-en',
						kind: 'subtitles',
						label: 'English',
						language: 'eng',
						file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/refs/heads/master/Anime/Anime/Rail.Wars!.(2014)/Rail.Wars!.S00E00/subtitles/Rail.Wars!.(2014).S00E00.NoMercy.eng.full.ass',
					},
					{
						id: 'fonts',
						kind: 'fonts',
						label: 'Fonts',
						file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/refs/heads/master/Anime/Anime/Rail.Wars!.(2014)/Rail.Wars!.S00E00/fonts.json',
					},
				],
			}],
		});

		// Register and activate the OctopusPlugin for ASS rendering
		player.registerPlugin('octopus', new OctopusPlugin({ renderAhead: 10 }));
		player.usePlugin('octopus');

		// Event log
		var logEl = document.getElementById('log');
		function log(msg) {
			logEl.textContent += msg + '\n';
			logEl.scrollTop = logEl.scrollHeight;
		}

		var subEnabled = false;
		var subBtn = document.getElementById('sub-toggle');
		var subStatus = document.getElementById('sub-status');

		function toggleSub() {
			if (subEnabled) {
				player.subtitle(-1);
			} else {
				player.subtitle(0);
			}
		}

		player.on('ready', function () {
			log('[ready] Player is ready — OctopusPlugin active');
			log('[ready] Click "Enable Subtitles" to see styled ASS rendering');
		});

		player.on('play', function () {
			log('[play] Playback started');
		});

		player.on('pause', function () {
			log('[pause] Playback paused');
		});

		// captionsChanged emits SubtitleTrack or undefined (when off)
		player.on('captionsChanged', function (track) {
			subEnabled = !!track;
			subBtn.textContent = subEnabled ? 'Disable Subtitles' : 'Enable Subtitles';
			subBtn.className = subEnabled ? 'active' : '';
			subStatus.textContent = subEnabled
				? 'Subtitles: ' + track.label + ' (ASS rendered via OctopusPlugin)'
				: 'Subtitles: off';
			log('[captionsChanged] ' + (subEnabled ? track.label : 'disabled'));
		});
	</script>
</body>
</html>
