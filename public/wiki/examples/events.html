<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Event System — NoMercy Video Player</title>
	<style>
		*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
		body { background: #18181b; color: #e4e4e7; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
		header { padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #27272a; }
		header a { color: #a78bfa; text-decoration: none; font-size: 0.875rem; }
		header a:hover { text-decoration: underline; }
		header h1 { font-size: 1.25rem; font-weight: 600; flex: 1; }
		main { max-width: 960px; margin: 0 auto; padding: 24px; }
		main > p { color: #a1a1aa; margin-bottom: 16px; line-height: 1.5; }
		#player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
		.controls { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
		.controls button {
			background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46;
			border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.875rem;
		}
		.controls button:hover { background: #3f3f46; }
		.controls button.active { background: #7c3aed; border-color: #7c3aed; }
		h2 { font-size: 1rem; font-weight: 600; margin-top: 24px; margin-bottom: 8px; }
		pre#log {
			background: #27272a; padding: 16px; border-radius: 8px;
			max-height: 200px; overflow-y: auto; font-size: 13px; margin-top: 8px;
			font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
			line-height: 1.4; white-space: pre-wrap;
		}
		.filters { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 12px; }
		.filters label {
			display: flex; align-items: center; gap: 4px;
			font-size: 0.8125rem; color: #a1a1aa; cursor: pointer;
		}
		.filters input[type="checkbox"] { accent-color: #a78bfa; }
		.log-playback { color: #4ade80; }
		.log-time { color: #60a5fa; }
		.log-volume { color: #e4e4e7; }
		.log-fullscreen { color: #e4e4e7; }
		.log-tracks { color: #fb923c; }
		.log-playlist { color: #c084fc; }
		.log-lifecycle { color: #e4e4e7; }
	</style>
</head>
<body>
	<header>
		<a href="/wiki/examples/">← All Examples</a>
		<h1>Event System</h1>
		<a href="https://github.com/NoMercy-Entertainment/NoMercyVideoPlayer/wiki/Events" target="_blank" rel="noopener">Wiki ↗</a>
	</header>

	<main>
		<p>
			A live event log showing every event the player fires. Uses a 2-item playlist (Sintel + Cosmos Laundromat)
			to demonstrate playlist events. Use the checkboxes below to filter which event categories appear.
		</p>

		<div id="player"></div>

		<div class="controls">
			<button onclick="player.play()">Play</button>
			<button onclick="player.pause()">Pause</button>
			<button onclick="player.next()">Next Item</button>
			<button onclick="player.previous()">Previous Item</button>
			<button onclick="clearLog()">Clear Log</button>
		</div>

		<h2>Event Filters</h2>
		<div class="filters">
			<label><input type="checkbox" data-category="playback" checked /> Playback</label>
			<label><input type="checkbox" data-category="time" checked /> Time</label>
			<label><input type="checkbox" data-category="volume" checked /> Volume</label>
			<label><input type="checkbox" data-category="fullscreen" checked /> Fullscreen</label>
			<label><input type="checkbox" data-category="tracks" checked /> Tracks</label>
			<label><input type="checkbox" data-category="playlist" checked /> Playlist</label>
			<label><input type="checkbox" data-category="lifecycle" checked /> Lifecycle</label>
		</div>

		<h2>Event Log</h2>
		<pre id="log"></pre>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/@nomercy-entertainment/nomercy-video-player@latest/dist/nomercy-video-player.iife.js"></script>
	<script>
		(function () {
			var logEl = document.getElementById('log');
			var lastTimeLog = 0;

			var categories = {
				playback: ['play', 'pause', 'buffer', 'idle', 'complete', 'beforePlay'],
				time: ['time'],
				volume: ['volume', 'mute'],
				fullscreen: ['fullscreen', 'resize'],
				tracks: ['levels', 'levelsChanged', 'audioTracks', 'audioTrackChanged', 'captionsList', 'captionsChanged'],
				playlist: ['playlist', 'item', 'playlistComplete', 'nextClick'],
				lifecycle: ['ready', 'firstFrame', 'error']
			};

			var eventToCategory = {};
			Object.keys(categories).forEach(function (cat) {
				categories[cat].forEach(function (evt) {
					eventToCategory[evt] = cat;
				});
			});

			function isFilterEnabled(category) {
				var cb = document.querySelector('.filters input[data-category="' + category + '"]');
				return cb ? cb.checked : true;
			}

			function log(eventName, data) {
				var category = eventToCategory[eventName] || 'lifecycle';
				if (!isFilterEnabled(category)) return;

				var time = new Date().toLocaleTimeString();
				var dataStr = '';
				if (data !== undefined && data !== null) {
					try {
						dataStr = ' ' + JSON.stringify(data, function (key, val) {
							if (typeof val === 'number') return Math.round(val * 100) / 100;
							return val;
						});
						if (dataStr.length > 120) dataStr = dataStr.substring(0, 117) + '...';
					} catch (e) {
						dataStr = ' [object]';
					}
				}

				var span = document.createElement('span');
				span.className = 'log-' + category;
				span.textContent = '[' + time + '] [' + eventName + ']' + dataStr + '\n';
				logEl.appendChild(span);
				logEl.scrollTop = logEl.scrollHeight;
			}

			window.clearLog = function () {
				logEl.innerHTML = '';
			};

			var player = window.player = nmplayer('player').setup({
				playlist: [
					{
						file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films/Sintel.(2010)/Sintel.(2010).NoMercy.m3u8',
						image: 'https://image.tmdb.org/t/p/w780/q2bVM5z90tCGbmXYtq2J38T5hSX.jpg',
						title: 'Sintel'
					},
					{
						file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films/Cosmos.Laundromat.(2015)/Cosmos.Laundromat.(2015).NoMercy.m3u8',
						image: 'https://image.tmdb.org/t/p/w780/f2wABsgj2lIR2dkDEfBZX8p4Iyk.jpg',
						title: 'Cosmos Laundromat'
					}
				]
			});

			// Playback events
			['play', 'pause', 'buffer', 'idle', 'complete', 'beforePlay'].forEach(function (evt) {
				player.on(evt, function (data) { log(evt, data); });
			});

			// Time event (throttled to every 5 seconds)
			player.on('time', function (data) {
				var now = Math.floor(data.position);
				if (now - lastTimeLog >= 5) {
					lastTimeLog = now;
					log('time', { position: data.position, duration: data.duration });
				}
			});

			// Volume events
			['volume', 'mute'].forEach(function (evt) {
				player.on(evt, function (data) { log(evt, data); });
			});

			// Fullscreen events
			['fullscreen', 'resize'].forEach(function (evt) {
				player.on(evt, function (data) { log(evt, data); });
			});

			// Track events
			['levels', 'levelsChanged', 'audioTracks', 'audioTrackChanged', 'captionsList', 'captionsChanged'].forEach(function (evt) {
				player.on(evt, function (data) { log(evt, data); });
			});

			// Playlist events
			['playlist', 'item', 'playlistComplete', 'nextClick'].forEach(function (evt) {
				player.on(evt, function (data) { log(evt, data); });
			});

			// Lifecycle events
			['ready', 'firstFrame', 'error'].forEach(function (evt) {
				player.on(evt, function (data) { log(evt, data); });
			});
		})();
	</script>
</body>
</html>
