<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Tracks: Quality, Subtitles &amp; Audio — NoMercy Video Player</title>
	<style>
		*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
		body { background: #18181b; color: #e4e4e7; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
		header { padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #27272a; }
		header a { color: #a78bfa; text-decoration: none; font-size: 0.875rem; }
		header a:hover { text-decoration: underline; }
		header h1 { font-size: 1.25rem; font-weight: 600; flex: 1; }
		main { max-width: 960px; margin: 0 auto; padding: 24px; }
		main > p { color: #a1a1aa; margin-bottom: 16px; line-height: 1.5; }
		#player { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
		.controls { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
		.controls button {
			background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46;
			border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 0.875rem;
		}
		.controls button:hover { background: #3f3f46; }
		.controls button.active { background: #7c3aed; border-color: #7c3aed; }
		h2 { font-size: 1rem; font-weight: 600; margin-top: 24px; margin-bottom: 8px; }
		pre#log {
			background: #27272a; padding: 16px; border-radius: 8px;
			max-height: 200px; overflow-y: auto; font-size: 13px; margin-top: 8px;
			font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
			line-height: 1.4; white-space: pre-wrap;
		}
	</style>
</head>
<body>
	<header>
		<a href="/wiki/examples/">← All Examples</a>
		<h1>Tracks: Quality, Subtitles &amp; Audio</h1>
		<a href="https://github.com/NoMercy-Entertainment/NoMercyVideoPlayer/wiki/API-Reference-Methods" target="_blank" rel="noopener">Wiki ↗</a>
	</header>

	<main>
		<p>
			Demonstrates how to query and switch quality levels, subtitle tracks, and audio tracks
			using the player API. Buttons are populated dynamically from player events.
		</p>

		<div id="player"></div>

		<div class="controls">
			<button onclick="player.play()">Play</button>
			<button onclick="player.pause()">Pause</button>
		</div>

		<h2>Quality</h2>
		<div class="controls" id="quality-controls">
			<button class="active" onclick="setQuality(-1)">Auto</button>
		</div>

		<h2>Subtitles</h2>
		<div class="controls" id="subtitle-controls"></div>

		<h2>Audio Tracks</h2>
		<div class="controls" id="audio-controls"></div>

		<h2>Event Log</h2>
		<pre id="log"></pre>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/@nomercy-entertainment/nomercy-video-player@1.0.0-beta.14/dist/nomercy-video-player.iife.js"></script>
	<script>
		(function () {
			var logEl = document.getElementById('log');
			var qualityControls = document.getElementById('quality-controls');
			var subtitleControls = document.getElementById('subtitle-controls');
			var audioControls = document.getElementById('audio-controls');

			function log(msg) {
				var time = new Date().toLocaleTimeString();
				logEl.textContent += '[' + time + '] ' + msg + '\n';
				logEl.scrollTop = logEl.scrollHeight;
			}

			var player = nmplayer('player').setup({
				playlist: [{
					file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films/Sintel.(2010)/Sintel.(2010).NoMercy.m3u8',
					image: 'https://image.tmdb.org/t/p/w780/q2bVM5z90tCGbmXYtq2J38T5hSX.jpg',
					title: 'Sintel',
					tracks: [
						{
							file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films/Sintel.(2010)/subtitles/Sintel.(2010).NoMercy.eng.full.vtt',
							label: 'English',
							language: 'en',
							kind: 'subtitles'
						},
						{
							file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films/Sintel.(2010)/subtitles/Sintel.(2010).NoMercy.dut.full.vtt',
							label: 'Dutch',
							language: 'nl',
							kind: 'subtitles'
						},
						{
							file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films/Sintel.(2010)/subtitles/Sintel.(2010).NoMercy.fre.full.vtt',
							label: 'French',
							language: 'fr',
							kind: 'subtitles'
						},
						{
							file: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films/Sintel.(2010)/chapters.vtt',
							kind: 'chapters'
						}
					]
				}],
				chapters: true
			});

			// Quality levels (levels event emits Level[] directly)
			player.on('levels', function (levels) {
				log('levels → ' + levels.length + ' quality levels available');
				levels.forEach(function (level, i) {
					var btn = document.createElement('button');
					btn.textContent = level.height + 'p';
					btn.onclick = function () { setQuality(i); };
					qualityControls.appendChild(btn);
				});
			});

			player.on('levelsChanged', function (data) {
				log('levelsChanged → id: ' + data.id + ', name: ' + data.name);
				updateQualityButtons(data.id);
			});

			function setQuality(index) {
				player.quality(index);
				updateQualityButtons(index);
				log('Set quality → ' + (index === -1 ? 'Auto' : index));
			}

			function updateQualityButtons(activeIndex) {
				var buttons = qualityControls.querySelectorAll('button');
				buttons.forEach(function (btn, i) {
					// index 0 = Auto (-1), rest are offset by 1
					if (activeIndex === -1) {
						btn.classList.toggle('active', i === 0);
					} else {
						btn.classList.toggle('active', i === activeIndex + 1);
					}
				});
			}

			// Subtitle tracks — captionsList emits subtitles() which includes "Off" (id: -1) at index 0
			player.on('captionsList', function (tracks) {
				log('captionsList → ' + tracks.length + ' entries (including Off)');
				subtitleControls.innerHTML = '';
				tracks.forEach(function (track, i) {
					var btn = document.createElement('button');
					btn.textContent = track.label || track.language || ('Track ' + i);
					if (i === 0) btn.classList.add('active');
					btn.onclick = function () { setSubtitle(i); };
					subtitleControls.appendChild(btn);
				});
			});

			// captionsChanged always emits a SubtitleTrack object (id: -1 = Off)
			player.on('captionsChanged', function (track) {
				var isOff = track.id === -1;
				var activeIndex = isOff ? 0 : track.id + 1;
				log('captionsChanged → ' + (isOff ? 'Off' : track.label));
				updateSubtitleButtons(activeIndex);
			});

			function setSubtitle(index) {
				player.subtitle(index);
				log('Set subtitle → ' + (index === 0 ? 'Off' : index));
			}

			function updateSubtitleButtons(activeIndex) {
				var buttons = subtitleControls.querySelectorAll('button');
				buttons.forEach(function (btn, i) {
					btn.classList.toggle('active', i === activeIndex);
				});
			}

			// Audio tracks (audioTracks emits AudioTrack[] directly)
			player.on('audioTracks', function (tracks) {
				log('audioTracks → ' + tracks.length + ' audio tracks');
				audioControls.innerHTML = '';
				tracks.forEach(function (track, i) {
					var btn = document.createElement('button');
					btn.textContent = track.language || track.label || ('Audio ' + (i + 1));
					btn.onclick = function () { setAudioTrack(i); };
					audioControls.appendChild(btn);
				});
				updateAudioButtons(0);
			});

			player.on('audioTrackChanged', function (data) {
				log('audioTrackChanged → id: ' + data.id + ', name: ' + data.name);
				updateAudioButtons(data.id);
			});

			function setAudioTrack(index) {
				player.audioTrack(index);
				log('Set audio track → ' + index);
			}

			function updateAudioButtons(activeIndex) {
				var buttons = audioControls.querySelectorAll('button');
				buttons.forEach(function (btn, i) {
					btn.classList.toggle('active', i === activeIndex);
				});
			}
		})();
	</script>
</body>
</html>
