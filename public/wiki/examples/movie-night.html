<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Movie Night — NoMercy Video Player</title>
	<link rel="stylesheet" href="shared.css" />
</head>
<body>
	<header>
		<a href="/wiki/examples/">← Examples</a>
		<h1>Movie Night</h1>
	</header>

	<main>
		<div id="player"></div>

		<div class="info-card">
			<img id="np-img" src="" alt="" />
			<div>
				<h3 id="np-title">Loading...</h3>
				<div class="meta" id="np-meta"></div>
				<div class="desc" id="np-desc"></div>
			</div>
		</div>

		<h2>Playback</h2>
		<div class="row">
			<button type="button" onclick="player.play()">Play</button>
			<button type="button" onclick="player.pause()">Pause</button>
			<button type="button" onclick="player.previous()">Previous</button>
			<button type="button" onclick="player.next()">Next</button>
			<button type="button" onclick="savePosition()">Save Position</button>
			<button type="button" onclick="resetPosition()">Reset Position</button>
		</div>

		<h2>Aspect Ratio</h2>
		<div class="row" id="aspect-row">
			<button type="button" onclick="player.cycleAspectRatio(); updateAspect()">Cycle</button>
			<button type="button" class="active" onclick="setAspect('uniform')">Uniform</button>
			<button type="button" onclick="setAspect('fill')">Fill</button>
			<button type="button" onclick="setAspect('exactfit')">Exact Fit</button>
			<button type="button" onclick="setAspect('16:9')">16:9</button>
			<button type="button" onclick="setAspect('4:3')">4:3</button>
		</div>

		<h2>Keyboard Shortcuts</h2>
		<div class="kbd-hints">
			<span><kbd>Space</kbd> Play / Pause</span>
			<span><kbd>←</kbd> -10s</span>
			<span><kbd>→</kbd> +10s</span>
			<span><kbd>M</kbd> Mute</span>
			<span><kbd>↑</kbd> Volume up</span>
			<span><kbd>↓</kbd> Volume down</span>
		</div>

		<h2>Log</h2>
		<pre id="log"></pre>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/@nomercy-entertainment/nomercy-video-player@1.0.0-beta.24/dist/nomercy-video-player.iife.js"></script>
	<script src="shared.js"></script>
	<script>
		var { log } = createLogger();

		var config = {
			basePath: 'https://raw.githubusercontent.com/NoMercy-Entertainment/media/master/Films/Films',
			imageBasePath: 'https://image.tmdb.org/t/p/w780',
			playlist: [
				{
					id: 'sintel',
					title: 'Sintel',
					show: 'Blender Open Movies',
					season: 1,
					episode: 1,
					year: 2010,
					description: 'A girl searches for her lost dragon in a fantasy world.',
					image: '/q2bVM5z90tCGbmXYtq2J38T5hSX.jpg',
					file: '/Sintel.(2010)/Sintel.(2010).NoMercy.m3u8',
					duration: '14:48',
					progress: { time: 120, date: '2024-01-15T10:30:00Z' },
				},
				{
					id: 'cosmos',
					title: 'Cosmos Laundromat',
					show: 'Blender Open Movies',
					season: 1,
					episode: 2,
					year: 2015,
					description: 'On a desolate island, a suicidal sheep meets a strange demon.',
					image: '/f2wABsgj2lIR2dkDEfBZX8p4Iyk.jpg',
					file: '/Cosmos.Laundromat.(2015)/Cosmos.Laundromat.(2015).NoMercy.m3u8',
					duration: '12:10',
				},
				{
					id: 'bbb',
					title: 'Big Buck Bunny',
					show: 'Blender Open Movies',
					season: 1,
					episode: 3,
					year: 2008,
					description: 'A giant rabbit takes revenge on three bullying rodents.',
					image: '/xtdybjRRZ15mCrPOvEld305myys.jpg',
					file: '/Big.Buck.Bunny.(2008)/Big.Buck.Bunny.(2008).NoMercy.m3u8',
					duration: '09:56',
				},
			],
		};

		var player = nmplayer('player').setup(config);

		// Now Playing card
		function updateNowPlaying(item) {
			document.getElementById('np-img').src = player.resolveImageUrl(item.image) || '';
			document.getElementById('np-title').textContent = item.title;
			document.getElementById('np-meta').textContent =
				'S' + item.season + ' E' + item.episode + ' · ' + item.show + ' · ' + item.year;
			document.getElementById('np-desc').textContent = item.description;
		}

		// Aspect buttons
		function setAspect(mode) {
			player.aspect(mode);
			updateAspect();
			log('[aspect] ' + mode);
		}

		function updateAspect() {
			var current = player.aspect();
			var btns = document.querySelectorAll('#aspect-row button');
			var names = [null, 'uniform', 'fill', 'exactfit', '16:9', '4:3'];
			btns.forEach(function (btn, i) {
				btn.classList.toggle('active', names[i] === current);
			});
		}

		// Save / Reset position
		function savePosition() {
			var time = player.currentTime();
			var item = player.playlistItem();
			item.progress = { time: Math.round(time), date: new Date().toISOString() };
			log('[save] Position saved at ' + time.toFixed(1) + 's');
		}

		function resetPosition() {
			var item = player.playlistItem();
			delete item.progress;
			player.seek(0);
			log('[reset] Position reset');
		}

		// Keyboard shortcuts
		document.addEventListener('keydown', function (e) {
			if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
			switch (e.key) {
				case ' ': e.preventDefault(); player.state() === 'playing' ? player.pause() : player.play(); break;
				case 'ArrowLeft': player.seek(Math.max(0, player.currentTime() - 10)); break;
				case 'ArrowRight': player.seek(player.currentTime() + 10); break;
				case 'ArrowUp': e.preventDefault(); player.volume(Math.min(100, player.volume() + 10)); break;
				case 'ArrowDown': e.preventDefault(); player.volume(Math.max(0, player.volume() - 10)); break;
				case 'm': case 'M': player.muted(!player.muted()); break;
			}
		});

		// Events
		player.on('ready', function () { log('[ready] Player ready'); });
		player.on('item', function (data) {
			updateNowPlaying(data);
			log('[item] ' + data.title);
		});
		player.on('play', function () { log('[play] Playing'); });
		player.on('pause', function () { log('[pause] Paused'); });
		player.on('seek', function () { log('[seek] → ' + player.currentTime().toFixed(1) + 's'); });
		player.on('complete', function () { log('[complete] Item finished'); });
		player.on('playlistComplete', function () { log('[playlistComplete] All done!'); });
	</script>
</body>
</html>
